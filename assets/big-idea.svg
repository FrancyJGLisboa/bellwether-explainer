    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.02" r="0.8">
      <stop offset="0" stop-color="rgba(232,185,74,0.1)"/><stop offset="0.5" stop-color="rgba(232,185,74,0.025)"/><stop offset="1" stop-color="rgba(0,0,0,0)"/>
