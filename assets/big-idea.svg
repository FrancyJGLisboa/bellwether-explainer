<svg xmlns="http://www.w3.org/2000/svg" data-form="horizontal-pipeline" viewBox="0 0 1604 335.5" width="1604" height="335.5" role="img" aria-labelledby="d-title d-desc">
  <title id="d-title">bellwether — Big Idea</title>
  <desc id="d-desc">Every claim moves from raw as-published source through a frozen archive to a cited, computed, and scored prediction.</desc>
  <metadata><![CDATA[
12 as-published sources land -> facts.db freezes every vintage -> ground_answer cites source+date -> interpret_change computes direction -> graded call binds to falsifiable ledger
]]></metadata>
  <style>
    .flow-line { stroke-dasharray: 8 10; stroke-width: 3; animation: flow-dash 1.1s linear infinite; }
    @keyframes flow-dash { to { stroke-dashoffset: -36; } }
    .node-pulse { transform-box: fill-box; transform-origin: center; animation: node-pulse 2.1s cubic-bezier(0.4,0,0.2,1) infinite; }
    @keyframes node-pulse { 0%, 100% { opacity: 0.35; transform: scale(1); } 50% { opacity: 1; transform: scale(1.6); } }
    @media (prefers-reduced-motion: reduce) { .flow-line, .node-pulse { animation: none; } }
  </style>

