  <title id="d-title">bellwether — The Insight</title>
  <desc id="d-desc">Freezing every release vintage and computing changes mechanically turns eyeballed calls into falsifiable, cited ones.</desc>
  <metadata><![CDATA[
Frozen release vintages -> Computed, never eyeballed -> Falsifiable prediction ledger
]]></metadata>
